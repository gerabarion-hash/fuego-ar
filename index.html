<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuego AR — Monitor de Incendios</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #mapa { height: 100vh; width: 100%; }
    #titulo {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    #leyenda {
      position: absolute;
      bottom: 30px;
      right: 10px;
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
      line-height: 1.8;
    }
    #leyenda b { display: block; margin-bottom: 6px; font-size: 13px; }
    .leyenda-item { display: flex; align-items: center; gap: 8px; }
    .circulo { border-radius: 50%; border: 1.5px solid white; outline: 1px solid #ccc; flex-shrink: 0; }
    #contador {
      position: absolute;
      top: 16px; left: 16px;
      background: white;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    #contador span { font-weight: 500; color: #E24B4A; font-size: 16px; }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div id="titulo">Fuego AR — Focos activos Argentina</div>
  <div id="contador">Focos activos: <span id="num-focos">cargando...</span></div>
  <div id="loading">Cargando datos...</div>

  <div id="leyenda">
    <b>Intensidad del foco</b>
    <div class="leyenda-item">
      <div class="circulo" style="width:20px;height:20px;background:#8B0000;"></div>
      Alta
    </div>
    <div class="leyenda-item">
      <div class="circulo" style="width:14px;height:14px;background:#E24B4A;"></div>
      Media
    </div>
    <div class="leyenda-item">
      <div class="circulo" style="width:10px;height:10px;background:#FFA500;"></div>
      Baja
    </div>
    <div style="margin-top:8px; font-size:11px; color:#888;">
      Fuente: VIIRS · NASA FIRMS<br>
      Últimas 48 horas · FRP &gt; 10 MW
    </div>
  </div>

  <div id="mapa"></div>

  <script>
    var mapa = L.map('mapa').setView([-38, -63], 5);

    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Esri World Imagery'
    });

    var ign = L.tileLayer('https://wms.ign.gob.ar/geoserver/gwc/service/tms/1.0.0/capabaseargenmap@EPSG%3A3857@png/{z}/{x}/{-y}.png', {
      attribution: 'IGN Argentina',
      minZoom: 3,
      maxZoom: 18
    });

    var hibrido = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      attribution: 'Google Hybrid'
    });

    satelital.addTo(mapa);
    L.control.layers({
      "ESRI Satelital": satelital,
      "IGN Argentina": ign,
      "Google Híbrido": hibrido
    }).addTo(mapa);

    function pointInPolygon(lat, lng, polygon) {
      var x = lng, y = lat;
      var inside = false;
      for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        var xi = polygon[i][0], yi = polygon[i][1];
        var xj = polygon[j][0], yj = polygon[j][1];
        if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
          inside = !inside;
        }
      }
      return inside;
    }

    function dentroDeArgentina(lat, lng, geojson) {
      for (var f = 0; f < geojson.features.length; f++) {
        var geom = geojson.features[f].geometry;
        var polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
        for (var p = 0; p < polys.length; p++) {
          if (pointInPolygon(lat, lng, polys[p][0])) return true;
        }
      }
      return false;
    }

    var API_KEY = 'aadd078296d892e986dd7e921e040ce7';
    var urlNOAA20 = 'https://firms.modaps.eosdis.nasa.gov/api/area/csv/'
                 + API_KEY
                 + '/VIIRS_NOAA20_NRT/-73,-55,-53,-22/2';

    var urlNOAA21 = 'https://firms.modaps.eosdis.nasa.gov/api/area/csv/'
                 + API_KEY
                 + '/VIIRS_NOAA21_NRT/-73,-55,-53,-22/2';

    Promise.all([
      fetch('argentina.geojson').then(function(r) { return r.json(); }),
      fetch(urlNOAA20).then(function(r) { return r.text(); }),
      fetch(urlNOAA21).then(function(r) { return r.text(); })
    ])
    .then(function(resultados) {
      var geojson = resultados[0];
      var csv = resultados[1] + '\n' + resultados[2].split('\n').slice(1).join('\n');

      document.getElementById('loading').style.display = 'none';

      L.geoJSON(geojson, {
        style: { color: '#ffffff', weight: 1.5, fillOpacity: 0 }
      }).addTo(mapa);

      var lineas = csv.trim().split('\n');
      lineas.shift();

      var contadorFocos = 0;

      lineas.forEach(function(linea) {
        var columnas = linea.split(',');
        var lat = parseFloat(columnas[0]);
        var lng = parseFloat(columnas[1]);
        var brillo = parseFloat(columnas[2]);
        var fecha = columnas[5] || '';
        var hora = columnas[6] || '';
        var frp = parseFloat(columnas[12]) || 0;

        if (!isNaN(lat) && !isNaN(lng) && frp > 10 && dentroDeArgentina(lat, lng, geojson)) {
          contadorFocos++;

          var radio = brillo > 350 ? 10 : brillo > 320 ? 7 : 5;
          var color = brillo > 350 ? '#8B0000' : brillo > 320 ? '#E24B4A' : '#FFA500';
          var intensidad = brillo > 350 ? 'Alta' : brillo > 320 ? 'Media' : 'Baja';

          L.circleMarker([lat, lng], {
            radius: radio,
            fillColor: color,
            color: '#fff',
            weight: 1,
            fillOpacity: 0.85
          })
          .bindPopup(
            '<b>Foco activo</b><br>' +
            'Intensidad: <b>' + intensidad + '</b><br>' +
            'FRP: <b>' + frp + ' MW</b><br>' +
            'Fecha: ' + fecha + ' ' + hora + '<br>' +
            'Fuente: VIIRS · NASA FIRMS'
          )
          .addTo(mapa);
        }
      });

      document.getElementById('num-focos').textContent = contadorFocos;
    })
    .catch(function(error) {
      document.getElementById('loading').textContent = 'Error al cargar datos.';
      console.log('Error:', error);
    });
  </script>

</body>
</html>
